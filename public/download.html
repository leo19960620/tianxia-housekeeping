<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下載天下房務管理系統</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #003366, #0055aa);
            border-radius: 22px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 10px;
            color: #1d1d1f;
        }

        p {
            color: #86868b;
            margin: 0 0 30px;
        }

        .btn {
            display: block;
            background: #007aff;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .version {
            margin-top: 20px;
            font-size: 12px;
            color: #86868b;
        }

        .instructions {
            margin-top: 30px;
            text-align: left;
            font-size: 14px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
        }

        .instructions ol {
            padding-left: 20px;
            margin: 0;
        }

        .instructions li {
            margin-bottom: 5px;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">TIAN</div>
        <h1>天下房務管理系統</h1>
        <p>飯店房務交接與庫存管理專用</p>

        <a href="app-release.apk" download="天下服中交接.apk" class="btn">下載 Android 版本</a>

        <div class="instructions">
            <strong>安裝說明：</strong>
            <ol>
                <li>下載 APK 檔案</li>
                <li>開啟檔案進行安裝</li>
                <li>若系統提示，請選擇「允許安裝未知來源應用程式」</li>
            </ol>
        </div>

        <div class="version">
            最新版本：1.1<br>
            更新日期：2026/01/22
        </div>
    </div>
</body>

</html>
